<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>로딩 중...</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c-indigo: #6366f1;
      --c-rose:   #f43f5e;
      --c-white:  #ffffff;
      --c-text:   #111827;
      --c-muted:  #6b7280;
      --c-bg:     #f8fafc;
      --radius:   20px;
      --shadow:   0 20px 40px rgba(0,0,0,.12);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--page-bg, var(--c-bg));
      display: flex; align-items: center; justify-content: center;
      transition: background .4s;
    }

    /* ── 카드 컨테이너 ── */
    #app {
      width: 100%; max-width: 420px; min-height: 100dvh;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }

    /* ── 진행 바 ── */
    #progress-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: rgba(255,255,255,.25);
      z-index: 10;
    }
    #progress-fill {
      height: 100%; background: var(--c-indigo);
      border-radius: 0 3px 3px 0; transition: width .4s ease;
    }

    /* ── 페이지 ── */
    .page {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 28px 40px;
      gap: 0;
      will-change: transform, opacity;
    }
    .page.is-enter  { animation: pageIn  .35s cubic-bezier(.22,.61,.36,1) forwards; }
    .page.is-exit   { animation: pageOut .3s  cubic-bezier(.55,0,1,.45)   forwards; }
    .page.is-back   { animation: pageBack .35s cubic-bezier(.22,.61,.36,1) forwards; }
    .page.is-exit-back { animation: pageExitBack .3s cubic-bezier(.55,0,1,.45) forwards; }

    @keyframes pageIn       { from { opacity:0; transform:translateX(40px) } to { opacity:1; transform:none } }
    @keyframes pageOut      { from { opacity:1; transform:none } to { opacity:0; transform:translateX(-40px) } }
    @keyframes pageBack     { from { opacity:0; transform:translateX(-40px) } to { opacity:1; transform:none } }
    @keyframes pageExitBack { from { opacity:1; transform:none } to { opacity:0; transform:translateX(40px) } }

    /* ── 요소 스타일 ── */
    .el-emoji { line-height: 1; text-align: center; user-select: none; }
    .el-emoji.md { font-size: 48px; margin-bottom: 12px; }
    .el-emoji.lg { font-size: 64px; margin-bottom: 16px; }
    .el-emoji.xl { font-size: 80px; margin-bottom: 20px; }

    .el-heading {
      font-size: 26px; font-weight: 800; line-height: 1.25;
      color: var(--el-color, var(--c-text));
      margin-bottom: 12px;
    }
    .el-heading.left  { text-align: left;  align-self: flex-start; }
    .el-heading.center{ text-align: center; }
    .el-heading.right { text-align: right; align-self: flex-end; }

    .el-text {
      font-size: 15px; line-height: 1.7; color: var(--el-color, var(--c-muted));
      margin-bottom: 20px;
    }
    .el-text.left  { text-align: left;  align-self: flex-start; }
    .el-text.center{ text-align: center; }
    .el-text.right { text-align: right; align-self: flex-end; }

    .el-image { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
    .el-image img { width: 100%; display: block; }

    .el-btn {
      width: 100%; padding: 16px;
      border-radius: 14px; border: none; cursor: pointer;
      font-size: 16px; font-weight: 700; font-family: inherit;
      transition: all .15s; margin-top: 8px;
    }
    .el-btn:active { transform: scale(.97); }
    .el-btn.primary {
      background: var(--c-indigo); color: #fff;
      box-shadow: 0 4px 16px rgba(99,102,241,.35);
    }
    .el-btn.primary:hover { background: #4f52d4; }
    .el-btn.ghost {
      background: transparent; color: var(--c-indigo);
      border: 2px solid var(--c-indigo);
    }
    .el-btn.ghost:hover { background: rgba(99,102,241,.06); }
    .el-btn.text { background: transparent; color: var(--c-muted); font-weight: 600; }
    .el-btn.text:hover { color: var(--c-indigo); }

    .el-choices { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 4px; }
    .el-choice-btn {
      width: 100%; padding: 15px 18px;
      border-radius: 14px; border: 2px solid rgba(99,102,241,.25);
      background: rgba(255,255,255,.9); cursor: pointer;
      font-size: 15px; font-weight: 600; font-family: inherit;
      text-align: left; transition: all .15s; color: var(--c-text);
    }
    .el-choice-btn:hover { border-color: var(--c-indigo); background: rgba(99,102,241,.06); }
    .el-choice-btn:active { transform: scale(.98); }

    .el-input-wrap { width: 100%; margin-bottom: 6px; }
    .el-input-wrap label { display: block; font-size: 13px; font-weight: 600; color: var(--c-muted); margin-bottom: 6px; }
    .el-input-field {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 2px solid rgba(99,102,241,.2);
      font-size: 15px; font-family: inherit; outline: none;
      background: rgba(255,255,255,.9); color: var(--c-text);
      transition: border-color .15s;
    }
    .el-input-field:focus { border-color: var(--c-indigo); }

    /* ── 로딩 ── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; background: var(--c-bg);
      font-size: 14px; color: var(--c-muted);
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(99,102,241,.2);
      border-top-color: var(--c-indigo);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 에러 ── */
    #error-view {
      display: none; position: fixed; inset: 0;
      align-items: center; justify-content: center; flex-direction: column;
      gap: 12px; padding: 32px; text-align: center;
    }
    #error-view .err-icon { font-size: 48px; }
    #error-view .err-msg  { font-size: 15px; color: var(--c-muted); }

    @media (prefers-reduced-motion: reduce) {
      .page { animation: none !important; }
      .el-btn, .el-choice-btn { transition: none !important; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>서비스 불러오는 중...</span>
</div>

<div id="error-view">
  <div class="err-icon">⚠️</div>
  <div id="error-msg" class="err-msg">서비스를 불러올 수 없습니다.</div>
  <a href="/" style="color:#6366f1;font-size:14px;font-weight:600;">홈으로 돌아가기</a>
</div>

<div id="app" style="display:none;">
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  <!-- 페이지가 여기에 동적으로 렌더링됩니다 -->
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
(function() {
  'use strict';

  // ── Firebase 초기화 ──
  const FIREBASE_CONFIG = {
    apiKey:            'AIzaSyDw9j_3Di_Zn1kI_5KyQbGUV5o3I2APwkI',
    authDomain:        'hoxy-number.firebaseapp.com',
    projectId:         'hoxy-number',
    storageBucket:     'hoxy-number.firebasestorage.app',
    messagingSenderId: '311606639114',
    appId:             '1:311606639114:web:ea5d008da413abb9d33df3',
  };
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();

  // ── 런타임 상태 ──
  let def        = null;   // 서비스 정의
  let history_   = [];     // 방문 페이지 스택
  let state      = {};     // 사용자 입력값 { key: value }
  let currentPage = null;

  const appEl      = document.getElementById('app');
  const loadingEl  = document.getElementById('loading');
  const errorEl    = document.getElementById('error-view');
  const progressEl = document.getElementById('progress-fill');

  // ── URL에서 서비스 ID 추출 ──
  const params    = new URLSearchParams(location.search);
  const serviceId = params.get('s');

  if (!serviceId) {
    showError('서비스 ID가 없습니다. (?s=service-id)');
    return;
  }

  // ── Firestore에서 서비스 정의 로드 ──
  db.collection('siteConfig').doc('builderService-' + serviceId).get().then(function(snap) {
    if (!snap.exists) { showError('서비스를 찾을 수 없습니다.'); return; }
    def = snap.data();
    document.title = def.name || '서비스';
    loadingEl.style.display = 'none';
    appEl.style.display = 'flex';
    goToPage(0, 'enter');
  }).catch(function() {
    showError('서비스 로드 중 오류가 발생했습니다.');
  });

  // ── 페이지 이동 ──
  function goToPage(pageIdx, direction) {
    if (!def || !def.pages || pageIdx < 0 || pageIdx >= def.pages.length) return;

    const page = def.pages[pageIdx];
    const bg   = page.bg || '#f8fafc';

    // 배경색 전환
    document.body.style.setProperty('--page-bg', bg);

    // 기존 페이지 종료 애니메이션
    const existing = appEl.querySelector('.page');
    if (existing) {
      existing.classList.add(direction === 'back' ? 'is-exit-back' : 'is-exit');
      setTimeout(function() { existing.remove(); }, 300);
    }

    // 진행 바 업데이트
    const pct = def.pages.length > 1 ? Math.round((pageIdx / (def.pages.length - 1)) * 100) : 100;
    progressEl.style.width = pct + '%';

    // 새 페이지 렌더
    const pageEl = document.createElement('div');
    pageEl.className = 'page';
    pageEl.innerHTML = renderPageHTML(page);
    appEl.appendChild(pageEl);
    requestAnimationFrame(function() {
      pageEl.classList.add(direction === 'back' ? 'is-back' : 'is-enter');
    });

    currentPage = { idx: pageIdx, page };
    bindPageEvents(pageEl, page, pageIdx);
  }

  // ── 페이지 HTML 생성 ──
  function renderPageHTML(page) {
    return (page.elements || []).map(function(el) {
      return renderElementHTML(el, page);
    }).join('');
  }

  function renderElementHTML(el, page) {
    if (el.type === 'emoji') {
      return '<div class="el-emoji ' + (el.size || 'xl') + '">' + escHtml(el.value || '✨') + '</div>';
    }
    if (el.type === 'heading') {
      var text = interpolate(el.text || '', state);
      return '<h1 class="el-heading ' + (el.align || 'center') + '">' + escHtml(text) + '</h1>';
    }
    if (el.type === 'text') {
      var text = interpolate(el.text || '', state);
      return '<p class="el-text ' + (el.align || 'center') + '">' + escHtml(text).replace(/\n/g, '<br>') + '</p>';
    }
    if (el.type === 'image' && el.url) {
      return '<div class="el-image"><img src="' + escHtml(el.url) + '" alt="' + escHtml(el.alt || '') + '" loading="lazy"></div>';
    }
    if (el.type === 'button') {
      return '<button class="el-btn ' + (el.style || 'primary') + '" data-action="' + escHtml(el.action || 'next') + '">' + escHtml(el.text || '다음') + '</button>';
    }
    if (el.type === 'choice') {
      var opts = (el.options || []).map(function(opt) {
        return '<button class="el-choice-btn" data-action="' + escHtml(opt.action || 'next') + '" data-value="' + escHtml(opt.text || '') + '">' + escHtml(opt.text || '') + '</button>';
      }).join('');
      return '<div class="el-choices">' + opts + '</div>';
    }
    if (el.type === 'input') {
      return '<div class="el-input-wrap"><label>' + escHtml(el.label || '') + '</label>' +
        '<input class="el-input-field" type="' + (el.inputType || 'text') + '" placeholder="' + escHtml(el.placeholder || '') + '" data-key="' + escHtml(el.key || '') + '"></div>';
    }
    if (el.type === 'spacer') {
      return '<div style="height:' + (el.height || 32) + 'px;flex-shrink:0;"></div>';
    }
    return '';
  }

  // ── 이벤트 바인딩 ──
  function bindPageEvents(pageEl, page, pageIdx) {
    // 버튼/선택지 클릭
    pageEl.querySelectorAll('[data-action]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var action = btn.dataset.action;
        var value  = btn.dataset.value;
        if (value !== undefined) state['_last_choice'] = value;
        handleAction(action, pageIdx);
      });
    });

    // 입력값 저장
    pageEl.querySelectorAll('.el-input-field[data-key]').forEach(function(input) {
      input.addEventListener('input', function() {
        state[input.dataset.key] = input.value;
      });
    });
  }

  // ── 액션 처리 ──
  function handleAction(action, fromPageIdx) {
    if (action === 'next') {
      var nextIdx = fromPageIdx + 1;
      if (nextIdx >= def.pages.length) nextIdx = def.pages.length - 1;
      history_.push(fromPageIdx);
      goToPage(nextIdx, 'forward');
    } else if (action === 'prev') {
      var prevIdx = history_.length ? history_.pop() : Math.max(0, fromPageIdx - 1);
      goToPage(prevIdx, 'back');
    } else if (action === 'end') {
      var lastIdx = def.pages.length - 1;
      history_.push(fromPageIdx);
      goToPage(lastIdx, 'forward');
    } else if (action === 'restart') {
      history_ = [];
      state    = {};
      goToPage(0, 'forward');
    } else if (action && action.startsWith('page:')) {
      var targetId  = action.slice(5);
      var targetIdx = def.pages.findIndex(function(p) { return p.id === targetId; });
      if (targetIdx >= 0) {
        history_.push(fromPageIdx);
        goToPage(targetIdx, 'forward');
      }
    }
  }

  // ── 유틸 ──
  function showError(msg) {
    loadingEl.style.display = 'none';
    errorEl.style.display   = 'flex';
    document.getElementById('error-msg').textContent = msg;
  }

  function escHtml(val) {
    return String(val || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // {{key}} → state[key] 치환
  function interpolate(text, st) {
    return text.replace(/\{\{(\w+)\}\}/g, function(_, k) { return st[k] || ''; });
  }
})();
</script>
</body>
</html>
