<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>로딩 중... | 도파민 공작소</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="google-adsense-account" content="ca-pub-7301223136166743">
  <link rel="icon" type="image/png" sizes="32x32" href="/dunsmile/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/dunsmile/assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/dunsmile/assets/apple-touch-icon.png">
  <!-- 공용 디자인 시스템 (기존 서비스와 동일) -->
  <link rel="stylesheet" href="/assets/css/tailwind-built.css">
  <link rel="stylesheet" href="/dunsmile/css/style.css">
  <style>
    /* ── 카드 앱 레이아웃 ── */
    .svc-app-card-area {
      flex: 1; position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .svc-app-card-area.is-result-mode { overflow-y: auto; }

    #sa-progress { height: 3px; background: rgba(99,102,241,.12); flex-shrink: 0; }
    #sa-progress-fill {
      height: 100%; background: #6366f1;
      border-radius: 0 3px 3px 0; transition: width .4s ease;
      width: 0%;
    }

    /* ── 페이지 (질문/인트로) ── */
    .sa-page {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px 40px;
      will-change: transform, opacity;
      background: var(--sa-page-bg, #f8fafc);
      overflow-y: auto;
    }
    /* 결과 페이지는 스크롤 허용 */
    .sa-page.is-result {
      position: relative; min-height: 100%; height: auto;
      justify-content: flex-start;
    }
    .sa-page.sa-enter      { animation: saIn   .35s cubic-bezier(.22,.61,.36,1) forwards; }
    .sa-page.sa-exit       { animation: saOut  .3s  cubic-bezier(.55,0,1,.45)   forwards; }
    .sa-page.sa-back       { animation: saBack .35s cubic-bezier(.22,.61,.36,1) forwards; }
    .sa-page.sa-exit-back  { animation: saExitBack .3s cubic-bezier(.55,0,1,.45) forwards; }
    @keyframes saIn       { from { opacity:0; transform:translateX(40px) } to { opacity:1; transform:none } }
    @keyframes saOut      { from { opacity:1; transform:none } to { opacity:0; transform:translateX(-40px) } }
    @keyframes saBack     { from { opacity:0; transform:translateX(-40px) } to { opacity:1; transform:none } }
    @keyframes saExitBack { from { opacity:1; transform:none } to { opacity:0; transform:translateX(40px) } }

    /* ── 빌더 요소 스타일 ── */
    .el-emoji { line-height: 1; text-align: center; user-select: none; }
    .el-emoji.md { font-size: 48px; margin-bottom: 12px; }
    .el-emoji.lg { font-size: 64px; margin-bottom: 16px; }
    .el-emoji.xl { font-size: 80px; margin-bottom: 20px; }
    .el-heading {
      font-size: 24px; font-weight: 800; line-height: 1.3;
      color: #111827; margin-bottom: 10px; width: 100%;
    }
    .el-heading.left   { text-align: left; }
    .el-heading.center { text-align: center; }
    .el-heading.right  { text-align: right; }
    .el-text {
      font-size: 15px; line-height: 1.7; color: #6b7280;
      margin-bottom: 16px; width: 100%;
    }
    .el-text.left   { text-align: left; }
    .el-text.center { text-align: center; }
    .el-text.right  { text-align: right; }
    .el-image { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
    .el-image img   { width: 100%; display: block; }
    .el-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer;
      font-size: 16px; font-weight: 700; font-family: inherit;
      transition: all .15s; margin-top: 8px;
    }
    .el-btn:active { transform: scale(.97); }
    .el-btn.primary { background: #6366f1; color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,.3); }
    .el-btn.primary:hover { background: #4f52d4; }
    .el-btn.ghost   { background: transparent; color: #6366f1; border: 2px solid #6366f1; }
    .el-btn.ghost:hover { background: rgba(99,102,241,.06); }
    .el-btn.text    { background: transparent; color: #6b7280; font-weight: 600; }
    .el-btn.text:hover { color: #6366f1; }
    .el-choices { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 4px; }
    .el-choice-btn {
      width: 100%; padding: 15px 18px; border-radius: 14px;
      border: 2px solid rgba(99,102,241,.25); background: rgba(255,255,255,.9);
      cursor: pointer; font-size: 15px; font-weight: 600; font-family: inherit;
      text-align: left; transition: all .15s; color: #111827;
    }
    .el-choice-btn:hover  { border-color: #6366f1; background: rgba(99,102,241,.06); }
    .el-choice-btn:active { transform: scale(.98); }
    .el-input-wrap { width: 100%; margin-bottom: 6px; }
    .el-input-wrap label {
      display: block; font-size: 13px; font-weight: 600;
      color: #6b7280; margin-bottom: 6px;
    }
    .el-input-field {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 2px solid rgba(99,102,241,.2); font-size: 15px;
      font-family: inherit; outline: none; background: rgba(255,255,255,.9);
      color: #111827; transition: border-color .15s;
    }
    .el-input-field:focus { border-color: #6366f1; }

    /* ── 로딩 / 에러 ── */
    #sa-loading {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; background: #f8fafc;
    }
    .sa-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(99,102,241,.2); border-top-color: #6366f1;
      animation: sa-spin .7s linear infinite;
    }
    @keyframes sa-spin { to { transform: rotate(360deg); } }
    #sa-error {
      position: fixed; inset: 0; z-index: 200; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 32px; text-align: center; background: #f8fafc;
    }

    @media (prefers-reduced-motion: reduce) {
      .sa-page { animation: none !important; }
      .el-btn, .el-choice-btn { transition: none !important; }
    }
  </style>
</head>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
(function () {
  'use strict';

  /* ── Firebase 초기화 ── */
  const FIREBASE_CONFIG = {
    apiKey:            'AIzaSyDw9j_3Di_Zn1kI_5KyQbGUV5o3I2APwkI',
    authDomain:        'hoxy-number.firebaseapp.com',
    projectId:         'hoxy-number',
    storageBucket:     'hoxy-number.firebasestorage.app',
    messagingSenderId: '311606639114',
    appId:             '1:311606639114:web:ea5d008da413abb9d33df3',
  };
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();
  window.__db = db;

  /* ── 런타임 상태 ── */
  let def         = null;
  let allServices = [];
  let history_    = [];
  let state       = {};

  const appEl      = document.getElementById('sa-app');
  const loadingEl  = document.getElementById('sa-loading');
  const errorEl    = document.getElementById('sa-error');
  const rootEl     = document.getElementById('svc-root');
  const progressEl = document.getElementById('sa-progress-fill');
  const titleEl    = document.getElementById('svc-title');

  const params    = new URLSearchParams(location.search);
  const serviceId = params.get('s');

  if (!serviceId) { showError('서비스 ID가 없습니다. (?s=service-id)'); return; }

  /* ── 카테고리 메타 (사이드바·캐러셀 공용) ── */
  const CATEGORY_META = {
    fortune:      { label: '🔮 운세/심리',  card: 'svc-related-card-purple', gradient: 'from-purple-500 to-pink-600' },
    fun:          { label: '🎯 놀이/테스트', card: 'svc-related-card-blue',   gradient: 'from-blue-500 to-purple-600' },
    luck:         { label: '🍀 행운/번호',   card: 'svc-related-card-blue',   gradient: 'from-blue-500 to-indigo-600' },
    finance:      { label: '📈 시장/데이터', card: 'svc-related-card-indigo', gradient: 'from-indigo-500 to-violet-600' },
    experimental: { label: '🧪 실험실',      card: 'svc-related-card-purple', gradient: 'from-amber-500 to-orange-600' },
  };
  const CAT_ORDER    = ['fortune', 'fun', 'luck', 'finance', 'experimental'];
  const BLOCKED_IDS  = ['market-sentiment'];

  /* ── 서비스 정의 + 서비스 목록 병렬 로드 ── */
  Promise.all([
    db.collection('siteConfig').doc('builderService-' + serviceId).get(),
    db.collection('siteConfig').doc('services').get(),
  ]).then(function (results) {
    var defSnap = results[0];
    var svcSnap = results[1];

    if (!defSnap.exists) { showError('서비스를 찾을 수 없습니다.'); return; }
    def = defSnap.data();

    /* 사이드바·캐러셀용 서비스 목록 */
    if (svcSnap.exists) {
      var raw = (svcSnap.data().services) || [];
      allServices = raw.filter(function (s) {
        return s && s.status !== 'disabled' && s.homeVisible !== false && !BLOCKED_IDS.includes(s.id);
      });
    }

    /* 페이지 메타 업데이트 */
    document.title = (def.name || '서비스') + ' | 도파민 공작소';
    titleEl.textContent = def.name || '서비스';
    rootEl.dataset.serviceId = def.id || serviceId;

    /* 사이드바 렌더 */
    renderSidebar();

    /* 로딩 → 쉘 전환 */
    loadingEl.style.display = 'none';
    rootEl.style.display = '';

    goToPage(0, 'enter');
  }).catch(function () {
    showError('서비스 로드 중 오류가 발생했습니다.');
  });

  /* ════════════════════════════════
     페이지 이동
  ════════════════════════════════ */
  function goToPage(pageIdx, direction) {
    if (!def || !def.pages || pageIdx < 0 || pageIdx >= def.pages.length) return;

    var page      = def.pages[pageIdx];
    var isResult  = page.type === 'result' || pageIdx === def.pages.length - 1;
    var bg        = page.bg || '#f8fafc';

    /* 배경색 (질문 페이지에서만 적용) */
    if (!isResult) appEl.style.setProperty('--sa-page-bg', bg);

    /* 이전 페이지 종료 */
    var existing = appEl.querySelector('.sa-page');
    if (existing) {
      existing.classList.add(direction === 'back' ? 'sa-exit-back' : 'sa-exit');
      setTimeout(function () { if (existing.parentNode) existing.remove(); }, 300);
    }

    /* 결과 페이지: #app 스크롤 모드 전환 */
    appEl.classList.toggle('is-result-mode', isResult);

    /* 진행 바 */
    var pct = def.pages.length > 1 ? Math.round((pageIdx / (def.pages.length - 1)) * 100) : 100;
    progressEl.style.width = pct + '%';

    /* 새 페이지 렌더 */
    var pageEl = document.createElement('div');
    pageEl.className = 'sa-page' + (isResult ? ' is-result' : '');
    pageEl.innerHTML = renderPageHTML(page, isResult);
    appEl.appendChild(pageEl);

    requestAnimationFrame(function () {
      pageEl.classList.add(direction === 'back' ? 'sa-back' : 'sa-enter');
    });

    bindPageEvents(pageEl, page, pageIdx);

    /* 결과 페이지: 캐러셀 carousel-controls 재초기화 트리거 */
    if (isResult && allServices.length > 1) {
      setTimeout(function () {
        if (window.initCarouselSections) window.initCarouselSections();
      }, 350);
    }
  }

  /* ════════════════════════════════
     페이지 HTML 생성
  ════════════════════════════════ */
  function renderPageHTML(page, isResult) {
    var html = (page.elements || []).map(renderElementHTML).join('');
    if (isResult) {
      html += renderRelatedCarousel();
    }
    return html;
  }

  function renderElementHTML(el) {
    var text, opts;
    if (el.type === 'emoji') {
      return '<div class="el-emoji ' + esc(el.size || 'xl') + '">' + esc(el.value || '✨') + '</div>';
    }
    if (el.type === 'heading') {
      text = interpolate(el.text || '', state);
      return '<h2 class="el-heading ' + esc(el.align || 'center') + '">' + esc(text) + '</h2>';
    }
    if (el.type === 'text') {
      text = interpolate(el.text || '', state);
      return '<p class="el-text ' + esc(el.align || 'center') + '">' + esc(text).replace(/\n/g, '<br>') + '</p>';
    }
    if (el.type === 'image' && el.url) {
      return '<div class="el-image"><img src="' + esc(el.url) + '" alt="' + esc(el.alt || '') + '" loading="lazy"></div>';
    }
    if (el.type === 'button') {
      return '<button class="el-btn ' + esc(el.style || 'primary') + '" data-action="' + esc(el.action || 'next') + '">' + esc(el.text || '다음') + '</button>';
    }
    if (el.type === 'choice') {
      opts = (el.options || []).map(function (opt) {
        return '<button class="el-choice-btn" data-action="' + esc(opt.action || 'next') + '" data-value="' + esc(opt.text || '') + '">' + esc(opt.text || '') + '</button>';
      }).join('');
      return '<div class="el-choices">' + opts + '</div>';
    }
    if (el.type === 'input') {
      return '<div class="el-input-wrap"><label>' + esc(el.label || '') + '</label>' +
        '<input class="el-input-field" type="' + esc(el.inputType || 'text') + '" placeholder="' + esc(el.placeholder || '') + '" data-key="' + esc(el.key || '') + '"></div>';
    }
    if (el.type === 'spacer') {
      return '<div style="height:' + (Number(el.height) || 32) + 'px;flex-shrink:0;"></div>';
    }
    return '';
  }

  /* ════════════════════════════════
     이벤트 바인딩
  ════════════════════════════════ */
  function bindPageEvents(pageEl, page, pageIdx) {
    pageEl.querySelectorAll('[data-action]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var value = btn.dataset.value;
        if (value !== undefined) state['_last_choice'] = value;
        handleAction(btn.dataset.action, pageIdx);
      });
    });
    pageEl.querySelectorAll('.el-input-field[data-key]').forEach(function (input) {
      input.addEventListener('input', function () {
        state[input.dataset.key] = input.value;
      });
    });
  }

  /* ════════════════════════════════
     액션 처리
  ════════════════════════════════ */
  function handleAction(action, fromIdx) {
    if (action === 'next') {
      var next = Math.min(fromIdx + 1, def.pages.length - 1);
      history_.push(fromIdx);
      goToPage(next, 'forward');
    } else if (action === 'prev') {
      var prev = history_.length ? history_.pop() : Math.max(0, fromIdx - 1);
      goToPage(prev, 'back');
    } else if (action === 'end') {
      history_.push(fromIdx);
      goToPage(def.pages.length - 1, 'forward');
    } else if (action === 'restart') {
      history_ = []; state = {};
      goToPage(0, 'forward');
    } else if (action && action.startsWith('page:')) {
      var targetId  = action.slice(5);
      var targetIdx = def.pages.findIndex(function (p) { return p.id === targetId; });
      if (targetIdx >= 0) { history_.push(fromIdx); goToPage(targetIdx, 'forward'); }
    }
  }

  /* ════════════════════════════════
     사이드바 동적 렌더
  ════════════════════════════════ */
  function renderSidebar() {
    var groupsRoot = document.getElementById('serviceMenuGroups');
    if (!groupsRoot) return;

    var byCategory = {};
    allServices.forEach(function (s) {
      var cat = s.category || 'fun';
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(s);
    });

    var html = '';
    CAT_ORDER.forEach(function (cat) {
      var items = byCategory[cat];
      if (!items || items.length === 0) return;
      var meta    = CATEGORY_META[cat] || { label: cat };
      var isOpen  = items.some(function (s) { return s.id === serviceId; });
      html += '<details class="dp-side-group"' + (isOpen ? ' open' : '') + '>';
      html += '<summary class="dp-side-group-title"><span>' + meta.label + '</span><span class="dp-side-group-count">' + items.length + '</span></summary>';
      html += '<div class="dp-side-group-body">';
      items.forEach(function (s) {
        var active  = s.id === serviceId;
        var route   = s.route || ('/dunsmile/' + s.id + '/');
        var search  = (s.fullName || s.name || s.id).toLowerCase() + ' ' + (s.tags || []).join(' ').toLowerCase();
        html += '<a href="' + esc(route) + '" class="dp-menu-item' + (active ? ' active' : '') + '" data-service-item="1" data-service-search="' + esc(search) + '"><span>' + esc(s.emoji || '✨') + '</span><span>' + esc(s.fullName || s.name) + '</span></a>';
      });
      html += '</div></details>';
    });
    groupsRoot.innerHTML = html || '<p style="padding:8px 12px;font-size:13px;color:#9ca3af;">서비스 목록을 불러올 수 없습니다.</p>';
  }

  /* ════════════════════════════════
     결과 페이지 관련 서비스 캐러셀
  ════════════════════════════════ */
  function renderRelatedCarousel() {
    var others = allServices.filter(function (s) { return s.id !== serviceId; }).slice(0, 6);
    if (others.length === 0) return '';

    var arrowSvg = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';

    var cards = others.map(function (s) {
      var meta  = CATEGORY_META[s.category] || CATEGORY_META.fun;
      var route = s.route || ('/dunsmile/' + s.id + '/');
      var sub   = (s.desc || '').length > 32 ? s.desc.slice(0, 32) + '…' : (s.desc || '');
      return '<a href="' + esc(route) + '" class="svc-related-card ' + meta.card + '">' +
        '<div class="svc-related-card-head bg-gradient-to-br ' + meta.gradient + '">' +
          '<div class="svc-related-card-emoji">' + esc(s.emoji || '✨') + '</div>' +
          '<div class="svc-related-card-name">' + esc(s.fullName || s.name) + '</div>' +
          '<div class="svc-related-card-sub">' + esc(sub) + '</div>' +
        '</div>' +
        '<div class="svc-related-card-body">' +
          '<div class="svc-related-card-label">' + esc(s.name) + '</div>' +
          '<div class="svc-related-card-desc">' + esc(s.desc || '') + '</div>' +
          '<div class="svc-related-card-link text-blue-600">서비스 보러 가기 ' + arrowSvg + '</div>' +
        '</div>' +
      '</a>';
    }).join('');

    var dots = others.map(function (_, i) {
      return '<button type="button" class="svc-carousel-dot' + (i === 0 ? ' is-active' : '') + '" data-carousel-dot="' + i + '" aria-label="캐러셀 ' + (i + 1) + '번 카드로 이동"></button>';
    }).join('');

    return '<div class="svc-related-section" data-related-carousel-service="' + esc(serviceId) + '">' +
      '<h3 class="svc-related-title">다른 서비스도 확인해보세요!</h3>' +
      '<div class="dp-carousel-scroll svc-related-carousel">' + cards + '</div>' +
      '<div class="svc-carousel-dots-row svc-carousel-dots">' + dots + '</div>' +
    '</div>';
  }

  /* ════════════════════════════════
     유틸
  ════════════════════════════════ */
  function showError(msg) {
    loadingEl.style.display = 'none';
    errorEl.style.display   = 'flex';
    document.getElementById('sa-error-msg').textContent = msg;
  }

  function esc(val) {
    return String(val || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function interpolate(text, st) {
    return text.replace(/\{\{(\w+)\}\}/g, function (_, k) { return st[k] || ''; });
  }
})();
</script>
<script src="/dunsmile/js/service-ui.js"></script>
<script src="/dunsmile/js/carousel-controls.js" defer></script>
</body>
