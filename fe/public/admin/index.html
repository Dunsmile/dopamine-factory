<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 도파민 공작소</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>

<div class="adm-layout">

  <!-- ===== 사이드바 ===== -->
  <aside class="adm-sidebar">
    <a href="/" class="adm-sidebar__brand" aria-label="도파민 공작소 홈으로">
      <div class="adm-sidebar__brand-icon">✦</div>
      <div>
        <div class="adm-sidebar__brand-name">도파민 공작소</div>
        <div class="adm-sidebar__brand-sub">관리자 패널</div>
      </div>
    </a>

    <nav class="adm-sidebar__nav" aria-label="관리자 메뉴">

      <button class="adm-nav-item" data-page="dashboard">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
        대시보드
      </button>

      <div class="adm-sidebar__section">
        <div class="adm-sidebar__section-label">서비스</div>

        <button class="adm-nav-item" data-page="services">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
          </svg>
          서비스 목록
        </button>

        <button class="adm-nav-item" data-page="builder">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          서비스 만들기
        </button>
      </div>

      <div class="adm-sidebar__section">
        <div class="adm-sidebar__section-label">인사이트</div>

        <button class="adm-nav-item" data-page="analytics">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          애널리틱스
        </button>
      </div>

      <div class="adm-sidebar__section">
        <div class="adm-sidebar__section-label">수익화</div>

        <button class="adm-nav-item" data-page="sponsor">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          스폰서
        </button>
      </div>

      <div class="adm-sidebar__section">
        <div class="adm-sidebar__section-label">운영</div>

        <button class="adm-nav-item" data-page="settings">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          설정
        </button>
      </div>

    </nav>

    <div class="adm-sidebar__footer">
      <button class="adm-nav-item" id="adm-logout">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        로그아웃
      </button>
    </div>
  </aside>

  <!-- ===== 메인 콘텐츠 ===== -->
  <div class="adm-main">

    <!-- 헤더 -->
    <header class="adm-header">
      <h1 class="adm-header__title" id="adm-page-title">대시보드</h1>
      <div class="adm-header__actions">
        <button class="adm-btn adm-btn--ghost" onclick="window.__admNavigate('settings')" style="font-size:12px;" title="내보내기 / 재로드">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:13px;height:13px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          내보내기
        </button>
        <a href="/" class="adm-btn adm-btn--ghost" target="_blank" rel="noopener" style="font-size:12px;">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:13px;height:13px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          홈 보기
        </a>
        <div class="adm-header__user">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px;height:16px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          관리자
        </div>
      </div>
    </header>

    <!-- 콘텐츠 -->
    <main class="adm-content" id="adm-content">
      <div class="adm-empty">
        <div class="adm-spinner"></div>
      </div>
    </main>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="/admin/js/builder.js"></script>
<script src="/admin/js/admin.js"></script>
</body>
</html>
