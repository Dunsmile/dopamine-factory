<a href="{{href}}" class="svc-related-card {{borderClass}}" data-analytics="{{analytics}}">
  <div class="svc-related-card-head {{headClass}}">
    <div class="svc-related-card-emoji">{{emoji}}</div>
    <div class="svc-related-card-name">{{title}}</div>
    <div class="svc-related-card-sub">{{subtitle}}</div>
  </div>
  <div class="svc-related-card-body">
    <div class="svc-related-card-label">{{label}}</div>
    <div class="svc-related-card-desc">{{description}}</div>
    <div class="svc-related-card-link {{linkClass}}">
      {{linkText}} {{arrowIcon}}
    </div>
  </div>
</a>
