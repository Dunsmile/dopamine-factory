name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate mono structure
        run: bash tests/structure.test.sh

  frontend-smoke:
    runs-on: ubuntu-latest
    needs: structure-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate frontend entrypoints
        run: |
          test -f fe/public/index.html
          test -d fe/public/dunsmile
          test -d fe/public/assets
          test -f fe/public/sitemap.xml
          test -f fe/public/robots.txt

  backend-smoke:
    runs-on: ubuntu-latest
    needs: structure-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate backend folder
        run: |
          test -d be
          test -f be/README.md

  frontend-quality:
    runs-on: ubuntu-latest
    needs: [structure-check, frontend-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build Tailwind assets
        run: npm run build:tailwind
      - name: Run frontend tests
        run: |
          bash tests/dopamine_features.test.sh
          bash tests/frontend_optimization.test.sh
          bash tests/service_lab_profile_logic.test.sh
          bash tests/service_lab_semantic.test.sh
          bash tests/url_normalization.test.sh

  market-sentiment-quality:
    runs-on: ubuntu-latest
    needs: [structure-check, backend-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build Tailwind assets
        run: npm run build:tailwind
      - name: Run market sentiment tests
        run: bash tests/market_sentiment.test.sh
